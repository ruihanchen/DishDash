spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/dishdash
    username: dishdash_user
    password: dishdash_local_pw
    hikari:
      maximum-pool-size: 5

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    show-sql: true

app:
  jwt:
    secret: local-dev-secret-not-for-production-must-be-at-least-256-bits-long!!
    expiration-ms: 86400000

logging:
  level:
    com.dishdash: DEBUG
    org.springframework.security: DEBUG