# Local development environment
version: "3.9"

services:

  postgres:
    image: postgres:14-alpine
    # Alpine image: ~80MB vs ~400MB for the full image
    container_name: dishdash-postgres
    environment:
      POSTGRES_DB: dishdash
      POSTGRES_USER: dishdash_user
      POSTGRES_PASSWORD: dishdash_local_pw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Without this, every "docker compose down" wipes the local DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dishdash_user -d dishdash"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dishdash-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    # Mirrors a minimal production-like persistence config
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: